<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAGE | QnA 상세</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/faq.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  
</head>
<body>
  <div id="header"></div>
  <main class="faq-main">
    <div class="faq-title-wrap">
      <h2 class="faq-title">자주 묻는 질문</h2>
      <button class="faq-list-btn" onclick="location.href='faq.html'">목록</button>
    </div>
    <div class="faq-detail-main">
      <div class="faq-detail-title-sub"><h3>제목</h3></div>
      <div class="faq-detail-meta">작성자: 사용자&nbsp;&nbsp;|&nbsp;&nbsp;작성일: 2025-07-07</div>
      <div class="faq-detail-content">
        고객 문의 내용<br>
        예시: 요양원 등급 기준이 궁금합니다.
      </div>
      <div class="faq-detail-answer">
        <strong>문의 답변 내용</strong><br>
        예시: 등급 기준은 신체, 인지, 행동, 간호 등 다양한 항목을 평가하여 결정됩니다.
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script>
    fetch('header.html').then(r=>r.text()).then(t=>document.getElementById('header').innerHTML=t);
    fetch('footer.html').then(r=>r.text()).then(t=>document.getElementById('footer').innerHTML=t);
  </script>
</body>
</html>
