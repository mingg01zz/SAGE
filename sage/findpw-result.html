<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAGE | 비밀번호 재설정</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>
  <header>
    <div class="logo"><a href="main.html"><img src="img/sage-logo-temp.png" alt="SAGE 로고"></a></div>
    <nav>
      <a href="index.html">시설찾기</a>
      <a href="notice.html">공지사항</a>
      <a href="faq.html">QnA</a>
    </nav>
  </header>
  <main>
    <div class="find-result-box" style="text-align:center;margin-top:80px;">
      <h2>비밀번호 재설정</h2>
      <form style="display:inline-block;text-align:left;">
        <label for="newPw">새 비밀번호</label>
        <input type="password" id="newPw" name="newPw" style="display:block;width:100%;margin-bottom:12px;">
        <label for="newPw2">새 비밀번호 확인</label>
        <input type="password" id="newPw2" name="newPw2" style="display:block;width:100%;margin-bottom:16px;">
        <button type="submit" style="background:#7faaff;color:#fff;padding:10px 32px;border:none;border-radius:6px;width:100%;">확인</button>
      </form>
      <button onclick="location.href='login.html'" style="background:#eee;color:#222;padding:10px 32px;border:none;border-radius:6px;margin-top:16px;">로그인하러 가기</button>
    </div>
  </main>
  <div id="footer"></div>
  <script>
    fetch('header.html').then(r=>r.text()).then(t=>document.getElementById('header').innerHTML=t);
    fetch('footer.html').then(r=>r.text()).then(t=>document.getElementById('footer').innerHTML=t);
  </script>
</body>
</html>
