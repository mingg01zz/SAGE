<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAGE | 로그인</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body id="login-page">
  <div id="header"></div>
  <main class="login-main">
    <form class="login-form">
      <h2 class="login-title">로그인</h2>
      <div class="login-field">
        <label for="loginId">아이디</label>
        <input type="text" id="loginId" placeholder="아이디를 입력해주세요" required>
      </div>
      <div class="login-field">
        <label for="loginPw">비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호를 입력해주세요" required>
      </div>
      <button type="submit" class="login-btn">로그인</button>
      <div class="login-links">
        <a href="signup.html">회원가입</a> | <a href="findid.html">아이디 찾기</a> 
        | <a href="findpw.html">비밀번호 찾기</a>
      </div>
    </form>
  </main>
  <div id="footer"></div>
  <script>
    fetch('header.html').then(r=>r.text()).then(t=>document.getElementById('header').innerHTML=t);
    fetch('footer.html').then(r=>r.text()).then(t=>document.getElementById('footer').innerHTML=t);
  </script>
</body>
</html>
