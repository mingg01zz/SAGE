<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAGE | 공지사항 상세</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/notice.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>
  <div id="header"></div>
    <main class="notice-main">
      <div class="notice-title-wrap">
        <h2 class="notice-title">공지사항</h2>
        <button class="notice-list-btn" onclick="location.href='notice.html'">목록</button>
      </div>
    <div class="notice-detail-main">
      <div class="notice-detail-title">공지 제목</div>
      <div class="notice-detail-meta">작성자: 관리자&nbsp;&nbsp;|&nbsp;&nbsp;작성일: 2025-07-07</div>
      <div class="notice-detail-content">
        공지 내용이 여기에 표시됩니다.<br>
        시스템 점검 안내, 정책 변경, 기타 주요 공지사항 등...1
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script>
    fetch('header.html').then(r=>r.text()).then(t=>document.getElementById('header').innerHTML=t);
    fetch('footer.html').then(r=>r.text()).then(t=>document.getElementById('footer').innerHTML=t);
  </script>
</body>
</html>
