<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAGE | 아이디/비밀번호 찾기 결과</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>
  <div id="header"></div>
  <main class="find-main">
    <div class="find-box">
      <div class="find-tabs">
        <button class="find-tab active" id="tabFindId">아이디 찾기</button>
        <button class="find-tab" id="tabFindPw">비밀번호 찾기</button>
      </div>
      <div class="find-result" id="findIdResult">
        <div class="find-result-row">
          <img src="img/pngegg.png" alt="아이디 찾기 아이콘" class="find-result-icon">
          <div class="find-result-text">
            회원님의 아이디는<br>
            <b>minseo01*****</b> 입니다.
          </div>
        </div>
        <button class="find-btn find-result-btn" onclick="location.href='login.html'">로그인 하러 가기</button>
      </div>
      <div class="find-result" id="findPwResult" style="display:none;">
        <div class="find-result-title">비밀번호 재설정</div>
        <form class="find-form">
          <div class="find-field">
            <label>새 비밀번호</label>
            <input type="password" placeholder="영문, 숫자, 특수문자와 함께 사용하면 보다 안전합니다." required>
          </div>
          <div class="find-field">
            <label>새 비밀번호 확인</label>
            <input type="password" placeholder="비밀번호를 확인해주세요" required>
          </div>
          <button type="submit" class="find-btn find-result-btn">로그인하러 가기</button>
          
        </form>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script>
    fetch('header.html').then(r=>r.text()).then(t=>document.getElementById('header').innerHTML=t);
    fetch('footer.html').then(r=>r.text()).then(t=>document.getElementById('footer').innerHTML=t);
    // 탭 전환
    document.getElementById('tabFindId').onclick = function() {
      this.classList.add('active');
      document.getElementById('tabFindPw').classList.remove('active');
      document.getElementById('findIdResult').style.display = '';
      document.getElementById('findPwResult').style.display = 'none';
    };
    document.getElementById('tabFindPw').onclick = function() {
      this.classList.add('active');
      document.getElementById('tabFindId').classList.remove('active');
      document.getElementById('findIdResult').style.display = 'none';
      document.getElementById('findPwResult').style.display = '';
    };
  </script>
</body>
</html>
