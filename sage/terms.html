<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SAGE | 약관동의</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <div class="terms-box">
      <h2>통합 서비스 이용약관</h2>
      <div class="terms-content" style="height:220px;overflow-y:auto;border:1px solid #ddd;padding:16px;margin-bottom:16px;">
        <strong>개인정보처리방침</strong><br>
        1. 개인정보보호법에 따른 조건<br>
        2. 약관의 효력 및 개정<br>
        3. 서비스<br>
        4. 회원가입<br>
        ...<br>
        (여기에 실제 약관 내용이 들어갑니다)
      </div>
      <label><input type="checkbox" id="agree"> 약관 및 개인정보처리방침에 동의합니다.</label>
      <br><br>
      <button onclick="location.href='signup.html'" id="nextBtn" disabled>다음</button>
    </div>
    <script>
      document.getElementById('agree').addEventListener('change', function() {
        document.getElementById('nextBtn').disabled = !this.checked;
      });
    </script>
  </main>
  <div id="footer"></div>
  <script>
    fetch('header.html').then(r=>r.text()).then(t=>document.getElementById('header').innerHTML=t);
    fetch('footer.html').then(r=>r.text()).then(t=>document.getElementById('footer').innerHTML=t);
  </script>
</body>
</html>
