  examples: |
    - 안녕
    - 안녕하세요
    - 하이
    - 좋은 아침
    - 반가워요

- intent: goodbye
  examples: |
    - 잘 가
    - 안녕히 계세요
    - 나중에 봐요
    - 또 봐요
    - 좋은 하루 보내세요

- intent: find_hospital
  examples: |
    - [서울](location)에 있는 요양병원 추천해줘
